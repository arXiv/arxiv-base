name: Lint and test

on:
  workflow_call:
    inputs:
      package_name:
        description: Top level directory of package
        required: true
        type: string
  workflow_dispatch:
    inputs:
      package_name:
        description: Top level directory of package
        required: true
        type: string

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "${{ inputs.package_name }}/pyproject.toml"

      - name: Install the project
        run: uv sync --dev
        working-directory: ${{ inputs.package_name }}

      - name: Lint with Ruff
        run: uv run ruff check --output-format=github .
        working-directory: ${{ inputs.package_name }}

      - name: Type with ty
        run: uv run ty check
        working-directory: ${{ inputs.package_name }}

      - name: Run tests
        run: uv run pytest tests --confcutdir=tests
        working-directory: ${{ inputs.package_name }}
